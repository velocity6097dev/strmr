<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Torrent in Real-Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-900">

    <div class="w-full max-w-4xl space-y-8">
        <!-- Header -->
        <div class="text-center space-y-4">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Magnet Stream Engine
            </h1>
            <p class="text-slate-400">Paste a magnet link. The backend will handle the rest.</p>
            
            <div class="flex gap-4 items-center justify-center mt-6">
                <input type="text" id="magnet-input" placeholder="magnet:?xt=urn:btih:..." 
                    class="w-full max-w-xl px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 transition shadow-inner text-sm text-white">
                <button id="stream-btn" 
                    class="px-6 py-3 font-semibold rounded-lg bg-blue-600 hover:bg-blue-500 transition shadow-lg text-white">
                    Play
                </button>
            </div>
        </div>

        <!-- Status -->
        <div id="status-container" class="hidden flex flex-col space-y-3 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full text-xs font-bold text-slate-300 tracking-wide uppercase text-center">
                <div class="flex flex-col"><span class="text-slate-500 mb-1">Speed</span><span id="download-speed" class="text-blue-400">0 MB/s</span></div>
                <div class="flex flex-col"><span class="text-slate-500 mb-1">Downloaded</span><span id="downloaded-amount" class="text-purple-400">0 MB / 0 MB</span></div>
                <div class="flex flex-col"><span class="text-slate-500 mb-1">Peers</span><span id="peers" class="text-green-400">0</span></div>
                <div class="flex flex-col"><span class="text-slate-500 mb-1">Progress</span><span id="progress" class="text-white">0%</span></div>
            </div>
            <div class="w-full bg-slate-900 rounded-full h-2 overflow-hidden mt-2">
                <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-purple-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- Video Player -->
        <div class="relative w-full aspect-video bg-black rounded-xl border border-slate-800 hidden shadow-2xl" id="video-container">
            <video id="video-player" playsinline controls crossorigin></video>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="app.js"></script>
</body>
</html>
