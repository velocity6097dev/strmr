<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Stream Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-[#141414] text-white min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-2xl text-center space-y-6">
        <h1 class="text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-red-800 tracking-tight">
            Stream Anything.
        </h1>
        <p class="text-gray-400 text-lg">Paste a magnet link below. No local storage used.</p>
        
        <div class="flex flex-col sm:flex-row gap-4 mt-8">
            <input type="text" id="magnet-input" placeholder="magnet:?xt=urn:btih:..." 
                class="w-full px-5 py-4 rounded bg-gray-900 border border-gray-800 focus:outline-none focus:border-red-600 transition shadow-inner text-white">
            <button id="stream-btn" class="px-10 py-4 font-bold rounded bg-red-600 hover:bg-red-700 transition text-white whitespace-nowrap">
                Start Watching
            </button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
